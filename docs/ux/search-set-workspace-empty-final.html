<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Anacronia Empty Search Set Workspace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --background: oklch(0.145 0 0);
        --foreground: oklch(0.985 0 0);
        --card: oklch(0.205 0 0);
        --primary: oklch(0.922 0 0);
        --primary-foreground: oklch(0.205 0 0);
        --muted: oklch(0.269 0 0);
        --muted-foreground: oklch(0.708 0 0);
        --border: oklch(1 0 0 / 10%);
        --input: oklch(1 0 0 / 15%);
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--background);
        color: var(--foreground);
      }

      * { box-sizing: border-box; letter-spacing: 0; }
      body { margin: 0; min-height: 100vh; background: var(--background); }
      button, input { font: inherit; }

      .app { display: grid; min-height: 100vh; grid-template-columns: 280px minmax(0, 1fr); }
      .sidebar { display: flex; flex-direction: column; border-right: 1px solid var(--border); background: var(--card); padding: 1rem; }
      .brand { display: flex; align-items: center; justify-content: space-between; gap: .75rem; margin-bottom: .75rem; }
      .brand-left { display: flex; align-items: center; gap: .5rem; font-size: .875rem; font-weight: 500; }
      .brand-mark { display: inline-flex; width: 1.75rem; height: 1.75rem; align-items: center; justify-content: center; border: 1px solid var(--border); border-radius: .625rem; background: var(--background); font-size: .75rem; font-weight: 600; }
      .button { display: inline-flex; height: 2rem; align-items: center; justify-content: center; gap: .375rem; border: 1px solid transparent; border-radius: 999px; background: transparent; color: var(--foreground); padding: 0 .75rem; font-size: .875rem; font-weight: 500; white-space: nowrap; }
      .button-primary { background: var(--primary); color: var(--primary-foreground); }
      .button-ghost { color: var(--muted-foreground); }
      .button-icon { width: 2rem; padding: 0; }
      .new-search { width: 100%; margin-bottom: .625rem; }
      .nav-card { width: 100%; border: 1px solid var(--border); border-radius: 1.125rem; background: var(--background); color: var(--foreground); padding: .6875rem .75rem; text-align: left; }
      .nav-card + .nav-card { margin-top: .375rem; }
      .nav-card-active { background: var(--muted); box-shadow: inset 0 0 0 1px color-mix(in oklch, var(--foreground), transparent 70%); }
      .nav-card-library { margin-bottom: 1rem; }
      .nav-title { font-size: .875rem; font-weight: 500; line-height: 1.125rem; }
      .nav-meta { margin-top: .125rem; color: var(--muted-foreground); font-size: .8125rem; line-height: 1.125rem; }
      .section-head { display: flex; align-items: center; justify-content: space-between; gap: .5rem; margin: 0 .625rem .5rem; }
      .section-label, .section-count { color: var(--muted-foreground); font-size: .75rem; font-weight: 500; line-height: 1rem; }
      .input-wrap { position: relative; margin-bottom: .5rem; }
      .search-icon { position: absolute; left: .75rem; top: .4375rem; color: var(--muted-foreground); font-size: .75rem; }
      .input { width: 100%; height: 2rem; border: 1px solid transparent; border-radius: 999px; outline: none; background: color-mix(in oklch, var(--input), transparent 50%); color: var(--foreground); padding: 0 .6875rem 0 1.9375rem; font-size: .875rem; line-height: 1.25rem; }
      .input::placeholder { color: var(--muted-foreground); }
      .runtime { margin-top: auto; border-top: 1px solid var(--border); padding-top: .875rem; }
      .runtime-toggle { width: 100%; justify-content: space-between; color: var(--muted-foreground); }

      .main { min-width: 0; padding: 2.25rem 3rem; }
      .main-inner { max-width: 1240px; }
      .header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; }
      h1 { margin: 0; font-size: clamp(2.5rem, 5vw, 4.25rem); font-weight: 600; line-height: 1.05; }
      .term-row { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: 1.125rem; }
      .term-chip, .badge, .provider-pill { display: inline-flex; align-items: center; border: 1px solid var(--border); border-radius: 999px; }
      .term-chip { height: 1.5rem; background: var(--primary); color: var(--primary-foreground); padding: 0 .625rem; font-size: .8125rem; font-weight: 500; }
      .main-search { max-width: none; margin-top: 1.25rem; }
      .main-search .input { height: 3.25rem; border-color: var(--border); border-radius: 1.625rem; padding-left: 2.25rem; font-size: 1rem; }
      .main-search .search-icon { top: 1rem; left: 1rem; font-size: .875rem; }
      .provider-row { display: flex; flex-wrap: wrap; gap: .5rem; margin: 1rem 0 1.5rem; }
      .provider-pill { height: 2rem; background: transparent; color: var(--muted-foreground); padding: 0 .75rem; font-size: .8125rem; }
      .results-card { min-height: 27rem; border: 1px solid var(--border); border-radius: 1.5rem; background: var(--card); padding: 1.125rem; }
      .results-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 1rem; }
      .panel-title { font-size: 1rem; font-weight: 500; line-height: 1.25rem; }
      .panel-muted { margin-top: .25rem; color: var(--muted-foreground); font-size: .875rem; line-height: 1.25rem; }
      .badge { height: 1.5rem; padding: 0 .625rem; color: var(--foreground); font-size: .8125rem; }
      .empty { display: grid; min-height: 20rem; place-items: center; border: 1px dashed var(--border); border-radius: 1.25rem; color: var(--muted-foreground); text-align: center; }
      .empty-title { color: var(--foreground); font-size: 1.125rem; font-weight: 500; }
      .empty-copy { margin-top: .375rem; max-width: 25rem; font-size: .875rem; line-height: 1.375rem; }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-left"><span class="brand-mark">A</span><span>Anacronia</span></div>
          <button class="button button-ghost button-icon" aria-label="Settings">⚙</button>
        </div>
        <button class="button button-primary new-search">+ New Search Set</button>
        <button class="nav-card nav-card-library">
          <div class="nav-title">User Library</div>
          <div class="nav-meta">0 collected Image Assets</div>
        </button>
        <div class="section-head">
          <div class="section-label">Search Sets</div>
          <div class="section-count">2</div>
        </div>
        <div class="input-wrap">
          <span class="search-icon">⌕</span>
          <input class="input" placeholder="Filter by title or term" />
        </div>
        <button class="nav-card">
          <div class="nav-title">Snake Studies</div>
          <div class="nav-meta">anaconda, serpent</div>
        </button>
        <button class="nav-card nav-card-active">
          <div class="nav-title">Test</div>
          <div class="nav-meta">snake, anaconda, serpent</div>
        </button>
        <div class="runtime">
          <button class="button button-ghost runtime-toggle"><span>Local runtime</span><span>ok</span></button>
        </div>
      </aside>

      <main class="main">
        <div class="main-inner">
          <header class="header">
            <div>
              <h1>Test</h1>
              <div class="term-row">
                <button class="term-chip">snake</button>
                <button class="term-chip">anaconda</button>
                <button class="term-chip">serpent</button>
              </div>
            </div>
            <button class="button button-primary">Collect from Met</button>
          </header>

          <div class="input-wrap main-search">
            <span class="search-icon">⌕</span>
            <input class="input" placeholder="Search within Test" />
          </div>

          <div class="provider-row">
            <span class="provider-pill">Met not collected yet</span>
          </div>

          <section class="results-card">
            <div class="results-head">
              <div>
                <div class="panel-title">Results</div>
                <div class="panel-muted">0 Image Assets in this Search Set</div>
              </div>
              <span class="badge">0 shown</span>
            </div>
            <div class="empty">
              <div>
                <div class="empty-title">No Image Assets yet</div>
                <div class="empty-copy">Collect from Met to add local Image Assets to this Search Set.</div>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>
  </body>
</html>
