<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Anacronia Search Set Workspace Mockup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --background: oklch(0.145 0 0);
        --foreground: oklch(0.985 0 0);
        --card: oklch(0.205 0 0);
        --primary: oklch(0.922 0 0);
        --primary-foreground: oklch(0.205 0 0);
        --muted: oklch(0.269 0 0);
        --muted-foreground: oklch(0.708 0 0);
        --border: oklch(1 0 0 / 10%);
        --input: oklch(1 0 0 / 15%);
        --ring: oklch(0.556 0 0);
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: var(--background);
        color: var(--foreground);
        -webkit-font-smoothing: antialiased;
      }

      * {
        box-sizing: border-box;
        letter-spacing: 0;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--background);
      }

      button,
      input {
        font: inherit;
      }

      .app {
        display: grid;
        min-height: 100vh;
        grid-template-columns: 280px minmax(0, 1fr);
      }

      .sidebar {
        display: flex;
        min-height: 0;
        flex-direction: column;
        border-right: 1px solid var(--border);
        background: var(--card);
        padding: 1rem;
      }

      .brand {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        margin-bottom: 0.75rem;
      }

      .brand-left {
        display: flex;
        min-width: 0;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.875rem;
        font-weight: 500;
      }

      .brand-mark {
        display: inline-flex;
        width: 1.75rem;
        height: 1.75rem;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--border);
        border-radius: 0.625rem;
        background: var(--background);
        font-size: 0.75rem;
        font-weight: 600;
      }

      .button {
        display: inline-flex;
        height: 2rem;
        align-items: center;
        justify-content: center;
        gap: 0.375rem;
        border: 1px solid transparent;
        border-radius: 999px;
        background: transparent;
        color: var(--foreground);
        padding: 0 0.75rem;
        font-size: 0.875rem;
        font-weight: 500;
        white-space: nowrap;
      }

      .button-primary {
        background: var(--primary);
        color: var(--primary-foreground);
      }

      .button-outline {
        border-color: var(--border);
      }

      .button-ghost {
        color: var(--muted-foreground);
      }

      .button-icon {
        width: 2rem;
        padding: 0;
      }

      .new-search {
        width: 100%;
        margin-bottom: 0.625rem;
      }

      .nav-card {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 1.125rem;
        background: var(--background);
        color: var(--foreground);
        padding: 0.6875rem 0.75rem;
        text-align: left;
      }

      .nav-card + .nav-card {
        margin-top: 0.375rem;
      }

      .nav-card-active {
        background: var(--muted);
        box-shadow: inset 0 0 0 1px color-mix(in oklch, var(--foreground), transparent 70%);
      }

      .nav-card-library {
        margin-bottom: 1rem;
      }

      .nav-title {
        font-size: 0.875rem;
        font-weight: 500;
        line-height: 1.125rem;
      }

      .nav-meta {
        margin-top: 0.125rem;
        color: var(--muted-foreground);
        font-size: 0.8125rem;
        line-height: 1.125rem;
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        margin: 0 0.625rem 0.5rem;
      }

      .section-label,
      .section-count {
        color: var(--muted-foreground);
        font-size: 0.75rem;
        font-weight: 500;
        line-height: 1rem;
      }

      .input-wrap {
        position: relative;
      }

      .sidebar-filter {
        margin-bottom: 0.5rem;
      }

      .search-icon {
        position: absolute;
        left: 0.75rem;
        top: 0.4375rem;
        color: var(--muted-foreground);
        font-size: 0.75rem;
      }

      .input {
        width: 100%;
        height: 2rem;
        border: 1px solid transparent;
        border-radius: 999px;
        outline: none;
        background: color-mix(in oklch, var(--input), transparent 50%);
        color: var(--foreground);
        padding: 0 0.6875rem 0 1.9375rem;
        font-size: 0.875rem;
        line-height: 1.25rem;
      }

      .input::placeholder {
        color: var(--muted-foreground);
      }

      .search-set-list {
        min-height: 0;
        max-height: 23rem;
        overflow: hidden;
        padding-right: 0.1875rem;
      }

      .scroll-fade {
        position: relative;
        height: 2rem;
        margin-top: -1.5rem;
        background: linear-gradient(to bottom, transparent, var(--card));
        pointer-events: none;
      }

      .runtime {
        margin-top: auto;
        border-top: 1px solid var(--border);
        padding-top: 0.875rem;
      }

      .runtime-toggle {
        width: 100%;
        justify-content: space-between;
        color: var(--muted-foreground);
      }

      .main {
        min-width: 0;
        padding: 2.25rem 3rem;
      }

      .main-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 0.625rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.5rem, 5vw, 4.25rem);
        font-weight: 600;
        line-height: 1.05;
      }

      .title-actions {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding-top: 0.25rem;
      }

      .term-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-top: 1.125rem;
      }

      .term-chip,
      .badge,
      .provider-pill {
        display: inline-flex;
        align-items: center;
        border: 1px solid var(--border);
        border-radius: 999px;
      }

      .term-chip {
        height: 1.5rem;
        background: var(--primary);
        color: var(--primary-foreground);
        padding: 0 0.625rem;
        font-size: 0.8125rem;
        font-weight: 500;
      }

      .search-main {
        max-width: none;
        margin-top: 1.25rem;
      }

      .search-main .input {
        height: 3.25rem;
        border-color: var(--border);
        border-radius: 1.625rem;
        padding-left: 2.25rem;
        font-size: 1rem;
      }

      .search-main .search-icon {
        top: 1rem;
        left: 1rem;
        font-size: 0.875rem;
      }

      .provider-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin: 1rem 0 1.5rem;
      }

      .provider-pill {
        height: 2rem;
        gap: 0.5rem;
        background: var(--card);
        color: var(--foreground);
        padding: 0 0.5rem 0 0.75rem;
        font-size: 0.8125rem;
      }

      .provider-pill-muted {
        background: transparent;
        color: var(--muted-foreground);
      }

      .switch {
        position: relative;
        width: 2rem;
        height: 1.125rem;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--primary);
      }

      .switch::after {
        content: "";
        position: absolute;
        top: 0.125rem;
        right: 0.125rem;
        width: 0.75rem;
        height: 0.75rem;
        border-radius: 999px;
        background: var(--primary-foreground);
      }

      .switch-off {
        background: transparent;
      }

      .switch-off::after {
        right: auto;
        left: 0.125rem;
        background: var(--muted-foreground);
      }

      .results-card {
        min-height: 26rem;
        border: 1px solid var(--border);
        border-radius: 1.5rem;
        background: var(--card);
        padding: 1.125rem;
      }

      .results-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 1rem;
      }

      .panel-title {
        font-size: 1rem;
        font-weight: 500;
        line-height: 1.25rem;
      }

      .panel-muted {
        margin-top: 0.25rem;
        color: var(--muted-foreground);
        font-size: 0.875rem;
        line-height: 1.25rem;
      }

      .badge {
        height: 1.5rem;
        padding: 0 0.625rem;
        color: var(--foreground);
        font-size: 0.8125rem;
      }

      .image-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 0.5rem;
      }

      .thumb {
        position: relative;
        aspect-ratio: 1;
        border: 1px solid var(--border);
        border-radius: 0.875rem;
        background:
          linear-gradient(135deg, oklch(0.34 0 0), oklch(0.18 0 0)),
          var(--muted);
      }

      .thumb::after {
        content: attr(data-provider);
        position: absolute;
        left: 0.375rem;
        bottom: 0.375rem;
        border-radius: 999px;
        background: oklch(0.1 0 0 / 72%);
        color: oklch(0.86 0 0);
        padding: 0.125rem 0.375rem;
        font-size: 0.625rem;
      }

      .empty {
        display: grid;
        min-height: 18rem;
        place-items: center;
        border: 1px dashed var(--border);
        border-radius: 1.25rem;
        color: var(--muted-foreground);
        text-align: center;
      }

      .empty-title {
        color: var(--foreground);
        font-size: 1.125rem;
        font-weight: 500;
      }

      .empty-copy {
        margin-top: 0.375rem;
        max-width: 24rem;
        font-size: 0.875rem;
        line-height: 1.375rem;
      }

      .state-tabs {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1rem;
      }

      .state-label {
        color: var(--muted-foreground);
        font-size: 0.8125rem;
      }

      @media (max-width: 980px) {
        .app {
          grid-template-columns: 1fr;
        }

        .sidebar {
          display: none;
        }

        .main {
          padding: 1.25rem;
        }

        .image-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-left">
            <span class="brand-mark">A</span>
            <span>Anacronia</span>
          </div>
          <button class="button button-ghost button-icon" aria-label="Settings">⚙</button>
        </div>

        <button class="button button-primary new-search">+ New Search Set</button>

        <button class="nav-card nav-card-library">
          <div class="nav-title">User Library</div>
          <div class="nav-meta">385 collected Image Assets</div>
        </button>

        <div class="section-head">
          <div class="section-label">Search Sets</div>
          <div class="section-count">24</div>
        </div>

        <div class="input-wrap sidebar-filter">
          <span class="search-icon">⌕</span>
          <input class="input" placeholder="Filter by title or term" />
        </div>

        <div class="search-set-list">
          <button class="nav-card nav-card-active">
            <div class="nav-title">Snake Studies</div>
            <div class="nav-meta">snake, anaconda, serpent</div>
          </button>
          <button class="nav-card">
            <div class="nav-title">Masks</div>
            <div class="nav-meta">mask, face, ritual</div>
          </button>
          <button class="nav-card">
            <div class="nav-title">Textiles</div>
            <div class="nav-meta">woven, fragment</div>
          </button>
          <button class="nav-card">
            <div class="nav-title">Hands</div>
            <div class="nav-meta">hand, gesture, palm</div>
          </button>
          <button class="nav-card">
            <div class="nav-title">Mirrors</div>
            <div class="nav-meta">mirror, reflection</div>
          </button>
          <button class="nav-card">
            <div class="nav-title">Vessels</div>
            <div class="nav-meta">vase, jar, amphora</div>
          </button>
        </div>
        <div class="scroll-fade"></div>

        <div class="runtime">
          <button class="button button-ghost runtime-toggle">
            <span>Local runtime</span>
            <span>ok</span>
          </button>
        </div>
      </aside>

      <main class="main">
        <div class="main-header">
          <div>
            <h1>Snake Studies</h1>
            <div class="term-row" aria-label="Search term shortcuts">
              <button class="term-chip">snake</button>
              <button class="term-chip">anaconda</button>
              <button class="term-chip">serpent</button>
            </div>
          </div>
          <div class="title-actions">
            <button class="button button-outline">Export</button>
            <button class="button button-primary">Collect from Met</button>
          </div>
        </div>

        <div class="input-wrap search-main">
          <span class="search-icon">⌕</span>
          <input class="input" placeholder="Search within Snake Studies" />
        </div>

        <div class="provider-row" aria-label="Provider visibility toggles">
          <button class="provider-pill">
            <span>Met (248)</span>
            <span class="switch" aria-hidden="true"></span>
          </button>
          <button class="provider-pill">
            <span>V&A (96)</span>
            <span class="switch" aria-hidden="true"></span>
          </button>
          <button class="provider-pill provider-pill-muted">
            <span>Europeana (41)</span>
            <span class="switch switch-off" aria-hidden="true"></span>
          </button>
        </div>

        <section class="results-card" aria-label="Search Set results">
          <div class="results-head">
            <div>
              <div class="panel-title">Results</div>
              <div class="panel-muted">Met and V&A visible. Europeana hidden.</div>
            </div>
            <span class="badge">344 shown</span>
          </div>

          <div class="image-grid">
            <button class="thumb" data-provider="Met"></button>
            <button class="thumb" data-provider="V&A"></button>
            <button class="thumb" data-provider="Met"></button>
            <button class="thumb" data-provider="Met"></button>
            <button class="thumb" data-provider="V&A"></button>
            <button class="thumb" data-provider="Met"></button>
            <button class="thumb" data-provider="V&A"></button>
            <button class="thumb" data-provider="Met"></button>
            <button class="thumb" data-provider="Met"></button>
            <button class="thumb" data-provider="V&A"></button>
            <button class="thumb" data-provider="Met"></button>
            <button class="thumb" data-provider="V&A"></button>
            <button class="thumb" data-provider="Met"></button>
            <button class="thumb" data-provider="Met"></button>
            <button class="thumb" data-provider="Met"></button>
            <button class="thumb" data-provider="V&A"></button>
            <button class="thumb" data-provider="Met"></button>
            <button class="thumb" data-provider="Met"></button>
            <button class="thumb" data-provider="V&A"></button>
            <button class="thumb" data-provider="Met"></button>
            <button class="thumb" data-provider="V&A"></button>
          </div>
        </section>

        <div style="height: 2rem"></div>

        <section class="results-card" aria-label="Empty Search Set state">
          <div class="results-head">
            <div>
              <div class="panel-title">Empty state variant</div>
              <div class="panel-muted">Use this when no provider has been collected yet.</div>
            </div>
            <span class="badge">0 shown</span>
          </div>
          <div class="empty">
            <div>
              <div class="empty-title">No Image Assets yet</div>
              <div class="empty-copy">
                Collect from Met to create the first provider source for this Search Set.
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
